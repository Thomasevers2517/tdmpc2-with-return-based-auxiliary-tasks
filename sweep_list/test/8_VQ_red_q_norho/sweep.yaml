# Sweep test/8: V+Q with red_q_style_value, normalize_rho_weights=false
# Near duplicate of sweep 7 with added reacher-hard, V/Q both, 2 seeds, no rho normalization
# 4 tasks × 2 seeds × 2 critic_types = 16 runs

program: tdmpc2/train.py
project: tdmpc2-tdmpc2
method: grid
command:
  - ${env}
  - python
  - ${program}
  - ${args_no_hyphens}
parameters:
  task:
    values: ['finger-turn_hard', 'dog-stand', 'dog-run', 'reacher-hard']
  seed:
    values: [1, 2]
  critic_type:
    values: ['V', 'Q']
  steps:
    value: 100000

  # --- Fixed settings ---
  local_td_bootstrap:
    value: false
  red_q_style_value:
    value: true
  normalize_rho_weights:
    value: false

  utd_ratio:
    value: 1
  value_update_freq:
    value: 1
  planner_num_dynamics_heads:
    value: 1
  num_q:
    value: 5
  tau:
    value: 0.01
  consistency_coef:
    value: 20
  jacobian_correction_scale:
    value: 0
  buffer_update_interval:
    value: -1
  start_entropy_coeff:
    value: 1e-4

  # --- Standard defaults ---
  rollout_head_strategy:
    value: split
  num_rollouts:
    value: 1
