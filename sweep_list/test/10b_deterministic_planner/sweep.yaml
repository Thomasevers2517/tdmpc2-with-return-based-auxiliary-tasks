# Sweep 10b: Deterministic planner objective
# No policy sampling (Q-candidate action) + no value head subsampling (average all heads).
# 4 tasks × 4 seeds = 16 runs

program: tdmpc2/train.py
project: tdmpc2-tdmpc2
method: grid
command:
  - ${env}
  - python
  - ${program}
  - ${args_no_hyphens}
parameters:
  task:
    values: [hopper-hop, quadruped-walk, acrobot-swingup, dog-run]
  seed:
    values: [1, 2, 3, 4]
  steps:
    value: 100000

  # --- Ablation changes (vs baseline) ---
  planner_q_candidate_action:
    value: true
  planner_subsample_value_heads:
    value: false
