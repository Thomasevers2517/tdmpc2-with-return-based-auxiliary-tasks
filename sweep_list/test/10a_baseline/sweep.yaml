# Sweep 10a: Original TD-MPC2 baseline
# All defaults match original — no overrides needed beyond task/seed/steps.
# 4 tasks × 4 seeds = 16 runs

program: tdmpc2/train.py
project: tdmpc2-tdmpc2
method: grid
command:
  - ${env}
  - python
  - ${program}
  - ${args_no_hyphens}
parameters:
  task:
    values: [hopper-hop, quadruped-walk, acrobot-swingup, dog-run]
  seed:
    values: [1, 2, 3, 4]
  steps:
    value: 100000
