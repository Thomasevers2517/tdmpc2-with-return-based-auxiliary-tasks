# Sweep: BMPC equivalence test
# Match BMPC (wertyuilife2/bmpc) configuration exactly:
#   - V-critic with 2 heads (no RedQ subsetting)
#   - Policy via KL distillation from planner (KL(policy||expert))
#   - BMPC policy parameterization (tanh mean + clamp, no squash correction)
#   - log_std in [-3, 1] (BMPC default)
#   - Lazy reanalyze every 10 steps on 20 columns (60 obs)
#   - Expert from act() planner output (initial_expert_from_behavior)
# 3 tasks × 4 seeds = 12 runs

program: tdmpc2/train.py
project: tdmpc2-tdmpc2
method: grid
command:
  - ${env}
  - python
  - ${program}
  - ${args_no_hyphens}
parameters:
  task:
    values: [dog-run, humanoid-walk, quadruped-walk]
  seed:
    values: [1, 2, 3, 4]
  steps:
    value: 200000

  # --- BMPC architecture ---
  critic_type:
    value: V
  num_q:
    value: 2
  red_q_style_value:
    value: false

  # --- BMPC policy ---
  policy_optimization_method:
    value: distillation
  bmpc_policy_parameterization:
    value: true
  log_std_min:
    value: -3
  log_std_max:
    value: 1
